<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Collision Detection</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        .border {
            position: absolute;
            border: 5px dashed red;
            pointer-events: none;
        }
        .object {
            width: 50px;
            height: 50px;
            background-color: blue;
            position: absolute;
        }
    </style>
</head>
<body>

<div class="border" style="top: 0; left: 0; right: 0; bottom: 0;"></div>
<div class="object" id="movable-object"></div>

<script>
    const object = document.getElementById('movable-object');
    let posX = 0, posY = 0;
    const speed = 2;

    document.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowRight') posX += speed;
        if (event.key === 'ArrowLeft') posX -= speed;
        if (event.key === 'ArrowUp') posY -= speed;
        if (event.key === 'ArrowDown') posY += speed;

        // Collision detection
        if (posX < 0) posX = 0;
        if (posX > window.innerWidth - 50) posX = window.innerWidth - 50;
        if (posY < 0) posY = 0;
        if (posY > window.innerHeight - 50) posY = window.innerHeight - 50;

        object.style.transform = `translate(${posX}px, ${posY}px)`;
    });
</script>
</body>
</html>
