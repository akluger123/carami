<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <div class="login-container">
                <h1>AI Code Studio</h1>
                <p class="subtitle">Build with AI-powered code generation</p>
                <div class="login-card">
                    <svg class="github-icon" viewBox="0 0 24 24" width="48" height="48">
                        <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    <h2>Sign in with GitHub</h2>
                    <p class="login-description">Connect your GitHub account to start coding with AI</p>
                    <button id="github-login-btn" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        Continue with GitHub
                    </button>
                </div>
            </div>
        </div>

        <!-- Main App Screen -->
        <div id="main-screen" class="screen hidden">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <h1 class="app-title">AI Code Studio</h1>
                </div>
                <div class="header-right">
                    <div id="user-info" class="user-info">
                        <img id="user-avatar" class="user-avatar" alt="User avatar">
                        <span id="user-name" class="user-name"></span>
                    </div>
                    <button id="logout-btn" class="btn btn-secondary">Logout</button>
                </div>
            </header>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Left Panel: AI Prompt & Sessions -->
                <div class="left-panel">
                    <div class="panel-section">
                        <h2 class="section-title">AI Prompt</h2>
                        <textarea
                            id="ai-prompt"
                            class="prompt-input"
                            placeholder="Describe what you want to build... (e.g., 'Create a todo list with drag and drop functionality')"
                        ></textarea>
                        <button id="generate-btn" class="btn btn-primary btn-full">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                            </svg>
                            Generate Code
                        </button>
                    </div>

                    <div class="panel-section">
                        <div class="section-header">
                            <h2 class="section-title">Your Sessions</h2>
                            <button id="new-session-btn" class="btn btn-small">New</button>
                        </div>
                        <div id="sessions-list" class="sessions-list">
                            <!-- Sessions will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Code Editor & Preview -->
                <div class="right-panel">
                    <div class="editor-container">
                        <div class="editor-header">
                            <h2 class="section-title">Code Editor</h2>
                            <div class="editor-controls">
                                <button id="save-btn" class="btn btn-small">Save</button>
                                <button id="copy-btn" class="btn btn-small">Copy</button>
                            </div>
                        </div>
                        <textarea id="code-editor"></textarea>
                    </div>

                    <div class="preview-container">
                        <div class="preview-header">
                            <h2 class="section-title">Live Preview</h2>
                            <button id="refresh-preview-btn" class="btn btn-small">Refresh</button>
                        </div>
                        <iframe id="preview-frame" class="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay hidden">
            <div class="spinner"></div>
            <p>Generating code...</p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
